<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FlowShell</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; user-select: none; -webkit-tap-highlight-color: transparent; }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=1920') no-repeat center center/cover;
            position: relative;
        }

        /* SOL ÜST GERİ DÖNÜŞ VE BAŞLIK */
        .top-left-header {
            position: absolute; top: 20px; left: 20px;
            display: flex; align-items: center; gap: 12px; color: #fff; cursor: pointer;
            z-index: 10;
        }

        .liquid-arrow {
            width: 40px; height: 40px;
            background: rgba(255, 255, 255, 0.25);
            border-radius: 50%; border: 1px solid rgba(255, 255, 255, 0.4);
            display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(15px);
        }

        .header-title { font-size: 1.1rem; font-weight: 700; letter-spacing: 0.5px; }

        /* ANA PANEL */
        .main-panel {
            position: absolute;
            top: 85px; bottom: 95px; left: 20px; right: 20px;
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 24px; backdrop-filter: blur(20px);
            padding: 20px; color: #fff;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        /* İçerik Alanları */
        .view-content { display: none; width: 100%; height: 100%; }
        .view-content.active { display: flex; flex-direction: column; }
        
        .scrollable-area {
            flex: 1; width: 100%; height: 100%;
            overflow-y: auto; overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            padding-right: 5px;
        }

        /* GİRİŞ ALANI */
        .input-wrapper {
            width: 100%; height: 46px; margin-top: 10px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 14px; display: flex; align-items: center; padding: 0 15px;
        }
        .cmd-input {
            width: 100%; background: none; border: none; outline: none;
            color: #fff; font-size: 0.95rem; font-weight: 500; user-select: text;
        }

        /* LİSTE TASARIMI */
        .list-layout h3 { font-size: 1.1rem; margin-bottom: 15px; color: rgba(255,255,255,0.9); }
        .cmd-item {
            background: rgba(255, 255, 255, 0.06); border: 1px solid rgba(255, 255, 255, 0.12);
            padding: 14px 15px; border-radius: 14px; margin-bottom: 10px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .cmd-item .name { font-weight: 600; color: #64D2FF; font-size: 0.9rem; }
        .cmd-item .desc { font-size: 0.8rem; color: rgba(255, 255, 255, 0.5); }

        /* ELİT MİNİMAL DOCK BARI */
        .dock-container {
            position: absolute; bottom: 25px; left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 40px); max-width: 300px; height: 48px; /* Yükseklik tam ideal minimal boyuta çekildi */
            background: rgba(255, 255, 255, 0.1);
            border-radius: 24px; border: 1px solid rgba(255, 255, 255, 0.2);
            display: flex; align-items: center;
            backdrop-filter: blur(20px); padding: 0 5px; z-index: 100;
            touch-action: none;
        }

        .dock-tab {
            flex: 1; height: 100%; display: flex; align-items: center; justify-content: center;
            z-index: 2; color: rgba(255, 255, 255, 0.35); transition: color 0.2s; cursor: pointer;
        }
        .dock-tab.active { color: #fff; }
        .dock-tab svg { width: 18px; height: 18px; }

        /* PARMAĞI TAKİP EDEN GERÇEK MİNİ KAPSÜL */
        .dock-pill {
            position: absolute; left: 5px; top: 4px;
            width: 142px; height: 38px; /* Tam oturan ve narin duran kapsül boyutu */
            background: rgba(255, 255, 255, 0.28);
            border: 1px solid rgba(255, 255, 255, 0.45);
            border-radius: 19px; z-index: 1; pointer-events: none;
            box-shadow: 0 6px 15px rgba(0,0,0,0.08);
            transition: left 0.25s cubic-bezier(0.2, 1, 0.22, 1);
        }
    </style>
</head>
<body>

    <div class="top-left-header" onclick="window.location.href='anaekran.html'">
        <div class="liquid-arrow">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg>
        </div>
        <span class="header-title">FlowShell</span>
    </div>

    <div class="main-panel">
        
        <div class="view-content list-layout active" id="view-list">
            <div class="scrollable-area">
                <h3>Sistem Komutları</h3>
                <div class="cmd-item">
                    <span class="name">komut yok</span>
                    <span class="desc">komut yok</span>
                </div>
                <div class="cmd-item">
                    <span class="name">komut yok</span>
                    <span class="desc">komut yok</span>
                </div>
            </div>
        </div>

        <div class="view-content" id="view-terminal">
            <div class="scrollable-area" id="terminalLogArea">
                <div id="terminalOutput" style="font-size: 0.95rem; line-height: 1.4;">
                    FlowShell v1.0<br>
                </div>
            </div>
            <div class="input-wrapper">
                <input type="text" id="terminalInput" class="cmd-input" placeholder="Komut yazın..." autocomplete="off" autocapitalize="none">
            </div>
        </div>

    </div>

    <div class="dock-container" id="dock">
        <div class="dock-tab active" data-idx="0">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>
        </div>
        <div class="dock-tab" data-idx="1">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="4 17 10 11 4 5"></polyline><line x1="12" y1="19" x2="20" y2="19"></line></svg>
        </div>
        <div class="dock-pill" id="pill"></div>
    </div>

    <script>
        const dock = document.getElementById('dock');
        const pill = document.getElementById('pill');
        const tabs = document.querySelectorAll('.dock-tab');
        const views = document.querySelectorAll('.view-content');
        const output = document.getElementById('terminalOutput');
        const logArea = document.getElementById('terminalLogArea');
        const termInput = document.getElementById('terminalInput');

        let isDragging = false;
        let touchOffset = 0; 
        let currentViewIdx = 0;

        const LEFT_POS = 5;
        let rightPos = 153; 
        let pillWidth = 142;

        function updateDimensions() {
            const dockWidth = dock.getBoundingClientRect().width || 300;
            rightPos = dockWidth - pillWidth - LEFT_POS;
        }

        function switchView(idx) {
            currentViewIdx = idx;
            updateDimensions();
            tabs.forEach((t, i) => t.classList.toggle('active', i === idx));
            views.forEach((v, i) => v.classList.toggle('active', i === idx));
            
            pill.style.transition = 'left 0.25s cubic-bezier(0.2, 1, 0.22, 1)';
            pill.style.left = (idx === 0 ? LEFT_POS : rightPos) + 'px';

            if(idx === 1) {
                setTimeout(() => { termInput.focus(); }, 100);
            }
        }

        function dragStart(e) {
            isDragging = true;
            updateDimensions();
            let clientX = e.touches ? e.touches[0].clientX : e.clientX;
            let pillRect = pill.getBoundingClientRect();
            
            // Parmağın kapsülün neresine dokunduğunu (ofsetini) hesapla
            touchOffset = clientX - pillRect.left;
            pill.style.transition = 'none'; // Sürüklerken gecikmesiz takip için animasyonu kapat
        }

        function dragMove(e) {
            if (!isDragging) return;
            let clientX = e.touches ? e.touches[0].clientX : e.clientX;
            let dockRect = dock.getBoundingClientRect();
            
            // Parmağın bastığı yeri tam merkez alarak kaydır
            let newLeft = clientX - dockRect.left - touchOffset;

            // Güvenli Sınırlar Arasında Serbest Kaydırma
            if (newLeft < LEFT_POS) newLeft = LEFT_POS;
            if (newLeft > rightPos) newLeft = rightPos;

            pill.style.left = newLeft + 'px';
        }

        function dragEnd() {
            if (!isDragging) return;
            isDragging = false;
            
            let currentLeft = parseFloat(pill.style.left);
            let midPoint = (LEFT_POS + rightPos) / 2;
            
            // Yarı yolu geçtiyse kaydır, geçmediyse eski yerine fırlat
            if (currentLeft > midPoint) {
                switchView(1);
            } else {
                switchView(0);
            }
        }

        tabs.forEach(tab => {
            tab.addEventListener('click', (e) => {
                switchView(parseInt(e.currentTarget.getAttribute('data-idx')));
            });
        });

        // Event Listesi (Parmağı Birebir Takip Etme Yapısı)
        dock.addEventListener('mousedown', dragStart);
        window.addEventListener('mousemove', dragMove);
        window.addEventListener('mouseup', dragEnd);
        
        dock.addEventListener('touchstart', dragStart, { passive: true });
        window.addEventListener('touchmove', dragMove, { passive: true });
        window.addEventListener('touchend', dragEnd);

        window.addEventListener('resize', () => {
            window.scrollTo(0, 0);
            updateDimensions();
        });

        // KOMUT MOTORU
        termInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                let cmd = termInput.value.trim();
                if(!cmd) return;
                
                output.innerHTML += `<br><span style="color: rgba(255,255,255,0.5);">> ${cmd}</span>`;
                termInput.value = '';
                
                let commandName = cmd.toLowerCase();
                if(commandName === 'clear') {
                    output.innerHTML = 'FlowShell hazır.<br>';
                } else if(commandName === 'boost') {
                    output.innerHTML += `<br><span style="color: #30D158;">[fl-boost.js]: Çekirdek hızlandırıldı, RAM önbelleği optimize edildi.</span>`;
                } else {
                    output.innerHTML += `<br><span style="color: #FF453A;">Hata: 'fl-${commandName}.js' modülü bulunamadı.</span>`;
                }
                
                logArea.scrollTop = logArea.scrollHeight;
            }
        });

        // İlk yüklemede boyut kilitleri
        updateDimensions();
    </script>
</body>
</html>
