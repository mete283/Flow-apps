    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            user-select: none; 
            -webkit-tap-highlight-color: transparent;
        }
        
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=1920') no-repeat center center/cover;
            position: relative;
        }

        /* SAAT: Sol üst köşede, küçük, kalın ve saniyeli */
        .status-header {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #ffffff;
            font-size: 1.1rem;      
            font-weight: 700;       
            letter-spacing: 0.5px;  
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
            z-index: 10;
        }

        /* UYGULAMA GRUBU: GRID DÜZENİNE GEÇİRİLDİ (Satır başına net 4 uygulama) */
        .app-group {
            position: absolute;
            top: 85px; 
            left: 20px;
            right: 20px;
            bottom: 140px; 
            
            display: grid;
            grid-template-columns: repeat(4, 75px); /* Her satırda tam 4 kolon olacak */
            justify-content: space-between;        /* Ekran genişliğine göre dengeli dağıtır */
            row-gap: 25px;                         /* Alt satıra geçenlerle aradaki boşluk */
            
            overflow-y: auto; 
            align-content: flex-start; 
            z-index: 5;
        }

        /* Kaydırma çubuğunu gizleyelim */
        .app-group::-webkit-scrollbar {
            display: none;
        }

        .app-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: transform 0.2s ease;
            width: 75px; 
        }

        .app-container:active { 
            transform: scale(0.95); 
        }

        /* Premium Cam (Glassmorphic) Ortak İkon Yapısı */
        .glass-icon {
            width: 55px;
            height: 55px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }

        .icon-svg { 
            width: 32px; 
            height: 32px; 
            fill: #ffffff; 
        }

        .app-label {
            color: white;
            font-size: 0.70rem;
            font-weight: 500;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
            width: 100%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-align: center;
        }

        /* KÜÇÜK KARE SİLME BUTONU */
        .delete-app-square {
            position: absolute;
            top: -5px;
            right: -5px;
            width: 22px;
            height: 22px;
            background: #ff3b30;
            color: #ffffff;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 800;
            display: none; 
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.35);
            z-index: 50;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .delete-app-square:active {
            transform: scale(0.9);
            background: #d63025;
        }

        /* SİLME MODU SALLANMA ANİMASYONU */
        .jiggle-active {
            animation: jiggleAnimation 0.2s infinite alternate ease-in-out;
        }

        @keyframes jiggleAnimation {
            0% { transform: rotate(-1.5deg) scale(1); }
            100% { transform: rotate(1.5deg) scale(0.98); }
        }

        /* Sabitlenmiş Liquid Glass Dock */
        .bottom-dock {
            position: absolute;
            bottom: 20px; 
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 420px;
            height: 85px;
            border-radius: 28px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.16) 0%, rgba(255, 255, 255, 0.04) 100%);
            backdrop-filter: blur(25px) saturate(165%);
            -webkit-backdrop-filter: blur(25px) saturate(165%);
            border: 1px solid rgba(255, 255, 255, 0.28);
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.4), inset 0 1px 2px rgba(255, 255, 255, 0.25);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 0 10px;
            z-index: 20;
        }

        .dock-app {
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .dock-app:active {
            transform: scale(0.88);
        }

        .dock-glass-icon {
            width: 58px;
            height: 58px;
            border-radius: 18px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.22) 0%, rgba(255, 255, 255, 0.05) 100%);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.2);
        }

        .dock-glass-icon svg {
            width: 28px;
            height: 28px;
        }
    </style>
</head>

<style>
    /* MASTER CONTROLLER CONTAINER */
    .dynamic-island-container {
        position: fixed; 
        left: 50%;
        transform: translateX(-50%) scale(var(--island-scale, 1));
        top: var(--island-top, 15px);
        z-index: 999999;
        pointer-events: auto;
        display: none;
        transform-origin: top center;
    }

    .dynamic-island {
        width: 110px;
        height: 30px;
        background: #000000;
        border-radius: 20px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        transition: all var(--island-duration, 0.5s) cubic-bezier(0.19, 1, 0.22, 1);
        color: white;
        padding: 0 14px;
        position: relative;
        cursor: pointer;
    }

    .dynamic-island.expanded {
        width: 300px;
        height: 75px;
        border-radius: 24px;
        border-color: rgba(255, 255, 255, 0.15);
    }

    /* Buglı olan iç dönen renkler (.dynamic-island::before) tamamen kaldırıldı! */
    
    /* Alttan Hafif Aydınlatma Efekt Sınıfları (Yazıya Göre Dinamik Değişir) */
    .dynamic-island.glow-welcome.expanded {
        box-shadow: 0 4px 15px rgba(0, 242, 254, 0.3), 0 15px 35px rgba(0, 0, 0, 0.8);
        border-bottom: 2px solid rgba(0, 242, 254, 0.6);
    }
    
    .dynamic-island.glow-system.expanded {
        box-shadow: 0 4px 15px rgba(155, 93, 229, 0.35), 0 15px 35px rgba(0, 0, 0, 0.8);
        border-bottom: 2px solid rgba(155, 93, 229, 0.6);
    }
    
    .dynamic-island.glow-security.expanded {
        box-shadow: 0 4px 15px rgba(255, 59, 48, 0.35), 0 15px 35px rgba(0, 0, 0, 0.8);
        border-bottom: 2px solid rgba(255, 59, 48, 0.6);
    }
    
    .dynamic-island.glow-time.expanded {
        box-shadow: 0 4px 15px rgba(255, 149, 0, 0.35), 0 15px 35px rgba(0, 0, 0, 0.8);
        border-bottom: 2px solid rgba(255, 149, 0, 0.6);
    }
    
    .dynamic-island.glow-custom.expanded {
        box-shadow: 0 4px 15px rgba(76, 217, 100, 0.35), 0 15px 35px rgba(0, 0, 0, 0.8);
        border-bottom: 2px solid rgba(76, 217, 100, 0.6);
    }

    /* MOTION BLUR MODU */
    .dynamic-island.mode-blur {
        backdrop-filter: blur(25px) saturate(180%);
        -webkit-backdrop-filter: blur(25px) saturate(180%);
        background: rgba(10, 10, 15, 0.65) !important;
        border: 1px solid rgba(255, 255, 255, 0.22) !important;
    }

    /* SAF AMOLED MODU */
    .dynamic-island.mode-pure {
        background: #000000 !important;
    }

    /* İçerik Katmanı */
    .island-content {
        position: relative;
        z-index: 5; 
        display: flex;
        align-items: center;
        width: 100%;
        opacity: 0;
        transition: opacity 0.25s ease;
        white-space: normal;
        padding: 4px;
    }

    .dynamic-island.expanded .island-content { opacity: 1; }
    #islandMessage { font-size: 0.75rem; font-weight: 500; line-height: 1.4; color: #ffffff; }
</style>

<script>
    window.addEventListener('DOMContentLoaded', () => {
        if (!document.getElementById('mainIsland')) {
            const wrapper = document.createElement('div');
            wrapper.className = 'dynamic-island-container';
            wrapper.id = 'islandWrapper';
            wrapper.innerHTML = `
                <div class="dynamic-island" id="mainIsland">
                    <div class="island-content">
                        <span id="islandMessage">İletişim hattı hazır...</span>
                    </div>
                </div>
            `;
            document.body.appendChild(wrapper);
        }

        if (!document.getElementById('aiBrainBridge')) {
            const bridge = document.createElement('iframe');
            bridge.id = 'aiBrainBridge';
            bridge.src = 'dinamik.html';
            bridge.style.display = 'none'; 
            document.body.appendChild(bridge);
        }
        
        startModularIslandEngine();
    });

    function startModularIslandEngine() {
        const wrapper = document.getElementById('islandWrapper');
        const mainIsland = document.getElementById('mainIsland');
        const islandMessage = document.getElementById('islandMessage');

        function applyLiveConfig() {
            const config = JSON.parse(localStorage.getItem('flowIslandSettings')) || {
                visible: true, openOnStartup: true, visualMode: 'rgb', topPos: 15, scale: 100, duration: 5
            };

            if (!wrapper || !mainIsland) return config;

            wrapper.style.display = config.visible ? 'block' : 'none';

            // CSS Değişken Enjeksiyonu
            document.documentElement.style.setProperty('--island-top', config.topPos + 'px');
            document.documentElement.style.setProperty('--island-scale', (config.scale / 100));
            document.documentElement.style.setProperty('--island-duration', (config.duration / 10) + 's');

            // Temizleme ve Yeni Dinamik Sınıfları Ekleme
            mainIsland.classList.remove('mode-rgb', 'mode-blur', 'mode-pure');
            mainIsland.classList.add('mode-' + config.visualMode);

            return config;
        }

        const currentConfig = applyLiveConfig();

        window.addEventListener('storage', (e) => {
            if (e.key === 'flowIslandSettings') applyLiveConfig();
        });

        window.addEventListener("message", (event) => {
            if (event.data && event.data.type === "AI_INSIGHT_RESPONSE") {
                if (islandMessage) islandMessage.innerHTML = event.data.data.html;
                
                if (mainIsland) {
                    // Eski aydınlatma sınıflarını temizle
                    mainIsland.classList.remove('glow-welcome', 'glow-system', 'glow-security', 'glow-time', 'glow-custom');
                    
                    // Gelen içerik türüne göre alttan aydınlatma sınıfını ata
                    mainIsland.classList.add('glow-' + event.data.data.glowType);
                    mainIsland.classList.add('expanded');
                }
            }
        });

        function requestInsight(modeName) {
            const brain = document.getElementById('aiBrainBridge');
            if (brain && brain.contentWindow) {
                brain.contentWindow.postMessage({ type: "REQUEST_AI_INSIGHT", mode: modeName }, "*");
            }
        }

        if (mainIsland) {
            mainIsland.addEventListener('click', (e) => {
                e.stopPropagation();
                if (mainIsland.classList.contains('expanded')) {
                    mainIsland.classList.remove('expanded');
                } else {
                    requestInsight('click');
                }
            });
        }

        document.body.addEventListener('click', (e) => {
            if (mainIsland && mainIsland.classList.contains('expanded') && !e.target.closest('.dynamic-island')) {
                mainIsland.classList.remove('expanded');
            }
        });

        if (currentConfig.visible && currentConfig.openOnStartup) {
            setTimeout(() => {
                if (mainIsland && !mainIsland.classList.contains('expanded')) {
                    requestInsight('welcome');
                    setTimeout(() => {
                        if (mainIsland) mainIsland.classList.remove('expanded');
                    }, 4500);
                }
            }, 1000);
        }
    }
</script>

    <script>
    let lastTapTime = 0;
    let aodTimer = null;
    let isTrackingAod = false;

    // 15 saniyelik hareketsizlik sayacını başlatan veya sıfırlayan fonksiyon
    function resetAodAction() {
        if (!isTrackingAod) return;

        // Mevcut sayacı temizle
        if (aodTimer) clearTimeout(aodTimer);

        // 15 saniye (15000 ms) boyunca hiçbir dokunma olmazsa yönlendir
        aodTimer = setTimeout(() => {
            window.location.href = 'aod.html';
        }, 15000);
    }

    // Kullanıcı ekranda gezindiği sürece sayacı sıfırla (Sadece çift tık yapıldıktan sonra çalışır)
    window.addEventListener('touchstart', resetAodAction, { passive: true });
    window.addEventListener('touchmove', resetAodAction, { passive: true });
    window.addEventListener('click', resetAodAction);

    // ÇİFT DOKUNMADA ANINDA YÖNLENDİREN VE TARAYICI ENGELİNİ AŞAN SİSTEM
    document.addEventListener('touchstart', function (e) {
        const now = Date.now();
        const TIMESPAN = now - lastTapTime;

        // Peş peşe iki dokunuş arasındaki süre 30ms ile 300ms arasındaysa çift tıklama sayılır
        if (TIMESPAN < 300 && TIMESPAN > 30) {
            // Tarayıcının varsayılan zoom/büyütme hareketini iptal ederek kodun çalışmasını garantiye alıyoruz
            if (e.cancelable) e.preventDefault();

            // 1. Durum: Çift dokunulduğu an ANINDA aod.html'e gitmesini sağlıyoruz
            window.location.href = 'aod.html';

            // Yedek Güvenlik: Eğer sayfa yönlenirken milisaniyelik bir gecikme olursa sayacı da başlatıyoruz
            isTrackingAod = true;
            resetAodAction();
        }
        
        lastTapTime = now;
    }, { passive: false }); // preventDefault() kullanabilmek için passive: false olmak zorundadır
</script>

    <script>
        // 1. Saniyeli Saat Sistemi
        function updateHomeClock() {
            const now = new Date();
            const hours = now.getHours().toString().padStart(2, '0');
            const minutes = now.getMinutes().toString().padStart(2, '0');
            const seconds = now.getSeconds().toString().padStart(2, '0');
            document.getElementById('home-clock').innerText = `${hours}:${minutes}:${seconds}`;
        }
        setInterval(updateHomeClock, 1000);
        updateHomeClock();

        // 2. Flash Uygulamalarını Hafızadan Okuma ve Ekleme Sistemi
        function loadFlashApps() {
            const appGrid = document.getElementById('main-app-grid');
            document.querySelectorAll('.custom-created-app').forEach(el => el.remove());

            const installedApps = JSON.parse(localStorage.getItem('installedApps')) || [];

            installedApps.forEach(app => {
                const firstLetter = app.name.charAt(0).toUpperCase();

                const appContainer = document.createElement('div');
                appContainer.className = 'app-container custom-created-app';
                appContainer.dataset.id = app.id;
                appContainer.dataset.url = app.url;

                appContainer.innerHTML = `
                    <div class="delete-app-square">×</div>
                    <div class="glass-icon">
                        <span style="color: #ffffff; font-size: 1.6rem; font-weight: 700;">${firstLetter}</span>
                    </div>
                    <div class="app-label">${app.name}</div>
                `;

                appContainer.addEventListener('click', (e) => {
                    if (e.target.classList.contains('delete-app-square')) return;
                    window.location.href = app.url;
                });

                // UZUN BASILI TUTMA MODU
                let longPressTimer;
                const startPress = () => {
                    longPressTimer = setTimeout(() => {
                        document.querySelectorAll('.custom-created-app').forEach(item => {
                            item.querySelector('.delete-app-square').style.display = 'flex';
                            item.classList.add('jiggle-active');
                        });
                    }, 800); 
                };

                const endPress = () => { clearTimeout(longPressTimer); };

                appContainer.addEventListener('touchstart', startPress, { passive: true });
                appContainer.addEventListener('touchend', endPress);
                appContainer.addEventListener('mousedown', startPress);
                appContainer.addEventListener('mouseup', endPress);
                
                appContainer.addEventListener('contextmenu', (e) => {
                    e.preventDefault();
                    document.querySelectorAll('.custom-created-app').forEach(item => {
                        item.querySelector('.delete-app-square').style.display = 'flex';
                        item.classList.add('jiggle-active');
                    });
                });

                appContainer.querySelector('.delete-app-square').addEventListener('click', (e) => {
                    e.stopPropagation();
                    const targetId = appContainer.dataset.id;
                    let currentList = JSON.parse(localStorage.getItem('installedApps')) || [];
                    currentList = currentList.filter(item => item.id !== targetId);
                    localStorage.setItem('installedApps', JSON.stringify(currentList));
                    appContainer.remove();
                });

                appGrid.appendChild(appContainer);
            });
        }

        // Düzenleme modundan çıkış
        document.body.addEventListener('click', (e) => {
            if (!e.target.closest('.custom-created-app')) {
                document.querySelectorAll('.delete-app-square').forEach(square => square.style.display = 'none');
                document.querySelectorAll('.custom-created-app').forEach(item => item.classList.remove('jiggle-active'));
            }
        });

        window.addEventListener('DOMContentLoaded', loadFlashApps);
    </script>
</body>
