<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flow AiOS - System Recovery</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            user-select: none; 
            -webkit-tap-highlight-color: transparent;
        }
        
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=1920') no-repeat center center/cover;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Arka Plan Karartma Katmanı */
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.3);
            z-index: 1;
        }

        /* Ana Arayüz Container (Liquid Glass) */
        .error-window {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 480px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.06) 0%, rgba(255, 255, 255, 0.01) 100%);
            backdrop-filter: blur(35px) saturate(160%);
            -webkit-backdrop-filter: blur(35px) saturate(160%);
            border-left: 1px solid rgba(255, 255, 255, 0.12);
            border-right: 1px solid rgba(255, 255, 255, 0.12);
            display: flex;
            flex-direction: column;
            z-index: 5;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
        }

        /* Üst Bar (Header) */
        .chat-header {
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.02);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* Geri Butonu */
        .back-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.15);
            transition: background 0.2s;
        }

        .back-btn:active {
            background: rgba(255, 255, 255, 0.25);
        }

        .header-title {
            color: #ffffff;
            font-size: 1.05rem;
            font-weight: 600;
            letter-spacing: 0.3px;
        }

        .header-status {
            font-size: 0.65rem;
            color: rgba(255, 255, 255, 0.45);
            font-weight: 500;
            margin-top: 1px;
        }

        /* Merkez No Command Alanı */
        .container-center {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            text-align: center;
        }

        /* Yeni Sade İkon Alanı */
        .icon-wrapper {
            margin-bottom: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: modernFloat 4s infinite alternate ease-in-out;
        }

        /* Ortadaki Sade ve Parlayan Kırmızı Ünlem Logosu */
        .danger-sign-center {
            width: 72px;
            height: 72px;
            background: #ff3b30; /* Canlı sistem uyarısı kırmızısı */
            border: 4px solid rgba(255, 255, 255, 0.95);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 30px rgba(255, 59, 48, 0.6);
        }

        .danger-sign-center span {
            color: #ffffff;
            font-size: 2.2rem;
            font-weight: 800;
            transform: translateY(-2px);
        }

        @keyframes modernFloat {
            0% { transform: translateY(0px); filter: drop-shadow(0 10px 15px rgba(255, 59, 48, 0.2)); }
            100% { transform: translateY(-10px); filter: drop-shadow(0 20px 25px rgba(255, 59, 48, 0.4)); }
        }

        /* Klasik Android Yazıları */
        .error-title {
            color: #ffffff;
            font-size: 1.3rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .error-sub {
            color: rgba(255, 255, 255, 0.45);
            font-size: 0.85rem;
            font-weight: 400;
            max-width: 260px;
            line-height: 1.45;
        }
    </style>
</head>
<body>

    <div class="overlay"></div>

    <div class="error-window">
        
        <!-- ÜST BAR -->
        <div class="chat-header">
            <div class="header-left">
                <div class="back-btn" onclick="window.location.href='anaekran.html'">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="15 18 9 12 15 6"></polyline>
                    </svg>
                </div>
                <div>
                    <div class="header-title">Sistem Mesajı</div>
                    <div class="header-status">Uygulama Şuan Mevcut Değildir</div>
                </div>
            </div>
        </div>

        <!-- YENİ SADE İÇERİK ALANI -->
        <div class="container-center">
            
            <!-- Sadece Parlayan Kırmızı Ünlem Modülü -->
            <div class="icon-wrapper">
                <div class="danger-sign-center">
                    <span>!</span>
                </div>
            </div>

            <h2 class="error-title">No Command</h2>
            <p class="error-sub">Bu uygulama modülü henüz sisteme yüklenmedi veya geliştirilme aşamasında.</p>

        </div>

    </div>

</body>
</html>
