<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flow AiOS - App Flash</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
            user-select: none;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #ffffff; /* Temiz beyaz arka plan */
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* PREMIUM SOL ÜST GERİ DÖNÜŞ BUTONU */
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            border-radius: 14px;
            background: rgba(0, 0, 0, 0.03);
            border: 1px solid rgba(0, 0, 0, 0.05);
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 100;
        }
        .back-btn:active { 
            transform: scale(0.90); 
            background: rgba(0, 0, 0, 0.07); 
        }
        .back-btn svg { 
            width: 22px; 
            height: 22px; 
            fill: #1a1a1a; 
        }

        /* PREMIUM LIGHT GLASS KART YAPISI */
        .glass-card {
            width: 90%;
            max-width: 400px;
            padding: 32px;
            border-radius: 30px;
            background: linear-gradient(135deg, rgba(248, 249, 250, 0.95) 0%, rgba(241, 243, 245, 0.8) 100%);
            border: 1px solid rgba(0, 0, 0, 0.04);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.02);
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .card-header {
            text-align: center;
        }

        .card-title {
            font-size: 1.4rem;
            font-weight: 700;
            color: #1a1a1a;
            letter-spacing: -0.3px;
        }

        .card-subtitle {
            font-size: 0.82rem;
            color: #6c757d;
            margin-top: 4px;
            font-weight: 500;
        }

        /* GİRİŞ ALANLARI */
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-group label {
            font-size: 0.82rem;
            font-weight: 700;
            color: #495057;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-field {
            width: 100%;
            padding: 14px 16px;
            border-radius: 14px;
            border: 1px solid rgba(0, 0, 0, 0.08);
            background: rgba(255, 255, 255, 0.7);
            font-size: 0.95rem;
            font-weight: 500;
            color: #1a1a1a;
            transition: all 0.2s;
        }

        .input-field:focus {
            border-color: #1a1a1a;
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(0, 0, 0, 0.02);
        }

        /* EKLE BUTONU */
        .add-btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 14px;
            background: #1a1a1a;
            color: #ffffff;
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
        }

        .add-btn:active {
            transform: scale(0.97);
            background: #000000;
        }
    </style>
</head>
<body>

    <div class="back-btn" onclick="window.location.href='anaekran.html'" title="Ana Ekrana Dön">
        <svg viewBox="0 0 24 24">
            <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
        </svg>
    </div>

    <div class="glass-card">
        <div class="card-header">
            <div class="card-title">App Flash</div>
            <div class="card-subtitle">Sisteme harici web tabanlı uygulama yükleyin</div>
        </div>

        <div class="input-group">
            <label for="app-name">Uygulama Adı</label>
            <input type="text" id="app-name" class="input-field" placeholder="Örn: Google, YouTube...">
        </div>

        <div class="input-group">
            <label for="app-url">Uygulama Linki (URL)</label>
            <input type="url" id="app-url" class="input-field" placeholder="https://example.com">
        </div>

        <button class="add-btn" id="save-app-btn">UYGULAMAYI EKLE</button>
    </div>

    <script>
        document.getElementById('save-app-btn').addEventListener('click', () => {
            const nameInput = document.getElementById('app-name').value.trim();
            let urlInput = document.getElementById('app-url').value.trim();

            if (!nameInput || !urlInput) {
                alert('Lütfen tüm alanları doldurun!');
                return;
            }

            // URL protokol kontrolü
            if (!/^https?:\/\//i.test(urlInput)) {
                urlInput = 'https://' + urlInput;
            }

            let installedApps = JSON.parse(localStorage.getItem('installedApps')) || [];

            const newApp = {
                id: 'app_' + Date.now(),
                name: nameInput,
                url: urlInput
            };

            installedApps.push(newApp);
            localStorage.setItem('installedApps', JSON.stringify(installedApps));

            alert(`${nameInput} başarıyla yüklendi!`);
            window.location.href = 'anaekran.html';
        });
    </script>
</body>
</html>
