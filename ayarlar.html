<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flow AiOS - Ayarlar</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            user-select: none; 
            -webkit-tap-highlight-color: transparent;
        }
        
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #ffffff; /* Tamamen beyaz arka plan */
            position: relative;
        }

        /* ÜST KONTROL BARI */
        .top-bar {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            z-index: 10;
        }

        .back-btn {
            width: 45px;
            height: 45px;
            border-radius: 14px;
            background: rgba(0, 0, 0, 0.04);
            border: 1px solid rgba(0, 0, 0, 0.02);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .back-btn:active {
            transform: scale(0.92);
            background: rgba(0, 0, 0, 0.08);
        }

        .back-btn svg {
            width: 22px;
            height: 22px;
            fill: #1a1a1a;
        }

        .page-title {
            color: #1a1a1a;
            font-size: 1.3rem;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        /* AYARLAR LİSTE ALANI */
        .settings-list {
            position: absolute;
            top: 90px;
            left: 20px;
            right: 20px;
            bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow-y: auto;
            padding-bottom: 20px;
        }

        .settings-list::-webkit-scrollbar {
            display: none;
        }

        /* PREMIUM LIQUID LIGHT CARD */
        .settings-card {
            width: 100%;
            padding: 16px 20px;
            border-radius: 20px;
            background: linear-gradient(135deg, rgba(248, 249, 250, 0.95) 0%, rgba(241, 243, 245, 0.7) 100%);
            border: 1px solid rgba(0, 0, 0, 0.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.02);
        }

        .settings-card:active {
            transform: scale(0.98);
            background: linear-gradient(135deg, rgba(241, 243, 245, 0.95) 0%, rgba(233, 236, 239, 0.8) 100%);
        }

        .card-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .icon-box {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            background: #1a1a1a; /* Koyu asil ikon kutusu */
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
        }

        .icon-box svg {
            width: 22px;
            height: 22px;
            fill: #ffffff;
        }

        .label-text {
            color: #1a1a1a;
            font-size: 0.98rem;
            font-weight: 600;
        }

        .card-right {
            color: #adb5bd;
            font-size: 1.1rem;
            font-weight: 700;
            padding-right: 5px;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="back-btn" onclick="window.location.href='anaekran.html'">
            <svg viewBox="0 0 24 24">
                <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
            </svg>
        </div>
        <div class="page-title">Ayarlar</div>
    </div>

    <div class="settings-list">

        <div class="settings-card" onclick="window.location.href='güncelleme.html'">
            <div class="card-left">

                    </svg>
                </div>
                <div class="label-text">Sistem Güncellemesi</div>
            </div>
            <div class="card-right"></div>
        </div>

        <div class="settings-card" onclick="window.location.href='developer.html'">

            </div>

        </div>

        <div class="settings-card" onclick="window.location.href='hakkında.html'">

                <div class="icon-box">
                    <svg viewBox="0 0 24 24">

        <div class="settings-card" onclick="window.location.href='ozellikler.html'">

                    <svg viewBox="0 0 24 24">

                    </svg>
                </div>
                <div class="label-text">Diğer Özellikler</div>
            </div>
            <div class="card-right"></div>
        </div>

                <div class="settings-card" onclick="window.location.href='boot.html'">
            <div class="card-left">
                <div class="icon-box" style="background: rgba(255, 152, 0, 0.15);">

                    </svg>
                </div>

            </div>
            <div class="card-right"></div>
        </div>

        <div class="settings-card" onclick="window.location.href='kilit.html'">
            <div class="card-left">
                <div class="icon-box" style="background: rgba(244, 67, 54, 0.15);">
                    <svg viewBox="0 0 24 24" fill="#f44336" width="22" height="22">

                    </svg>
                </div>
                <div class="label-text">Kapat</div>
            </div>
            <div class="card-right"></div>
        </div>

    </div>

</body>
</html>
