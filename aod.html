<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flow AiOS - Always On Display</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;500;700&display=swap" rel="stylesheet">

    
    
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            user-select: none; 
            -webkit-tap-highlight-color: transparent;
        }
        
        /* OLED dostu saf siyah ve gerçekçi loş/hafif karartılmış AOD havası */
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            cursor: pointer;
        }

        /* Ekranı hafif karartmak ve gerçek AOD loşluğu vermek için soft opaklık filtresi */
        .aod-dimmer {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            opacity: 0.65; /* Ekranı hafif karartma filtresi */
            transition: opacity 0.3s ease;
        }

        /* Saat Stili - Net, belirgin ve loş beyaz */
        .aod-time {
            font-size: 5rem;
            font-weight: 200;
            color: #ffffff;
            line-height: 1.1;
            letter-spacing: -1px;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
            margin-bottom: 12px;
        }

        /* Gün ve Tarih Alanı */
        .aod-date {
            font-size: 1.2rem;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 0.5px;
            margin-bottom: 40px;
        }

        /* Alt kısımdaki çok hafif dokunma ipucu texti */
        .tap-hint {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.25);
            font-weight: 400;
            letter-spacing: 0.5px;
            animation: pulseHint 3s infinite ease-in-out;
            position: absolute;
            bottom: 40px;
        }

        @keyframes pulseHint {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.7; }
        }

        /* kilit.html Geçiş Efekti Perdesi */
        .fade-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
            z-index: 999;
        }
        .fade-overlay.active {
            opacity: 1;
        }
    </style>
</head>
<body id="aod-screen">

    <div class="fade-overlay" id="transition-overlay"></div>

    <div class="aod-dimmer">
        <div class="aod-time" id="aod-clock">00:00</div>
        
        <div class="aod-date" id="aod-calendar">Yükleniyor...</div>
    </div>

    <div class="tap-hint">kapatmak için dokunun</div>

    <script>
        // KUSURSUZ SAAT VE GÜN MOTORU
        function updateAODEngine() {
            const clockEl = document.getElementById('aod-clock');
            const calendarEl = document.getElementById('aod-calendar');
            
            const now = new Date();
            
            // Saat ve Dakikayı çekiyoruz (HH:MM)
            let hours = now.getHours().toString().padStart(2, '0');
            let minutes = now.getMinutes().toString().padStart(2, '0');
            clockEl.innerText = `${hours}:${minutes}`;
            
            // Gün adını ve Ay bilgisini Türkçe olarak eksiksiz alan format
            const options = { 
                weekday: 'long', 
                day: 'numeric', 
                month: 'long' 
            };
            
            // Tarayıcı dil uyumsuzluklarını önlemek için "tr-TR" zorlaması yapıldı
            calendarEl.innerText = now.toLocaleDateString('tr-TR', options);
        }

        // TIKLAMA VE KİLİT EKRANINA YÖNLENDİRME SÜRÜCÜSÜ
        function initNavigation() {
            const screen = document.getElementById('aod-screen');
            const overlay = document.getElementById('transition-overlay');

            screen.addEventListener('click', () => {
                // Ekranı pürüzsüzce karart ve kilit.html sayfasına geç
                overlay.classList.add('active');
                
                setTimeout(() => {
                    window.location.href = 'kilit.html';
                }, 250); // Hızlı ve akıcı geçiş hızı
            });
        }

        // SAYFA YÜKLENDİĞİNDE TETİKLENECEK MOTORLAR
        window.addEventListener('DOMContentLoaded', () => {
            updateAODEngine();
            setInterval(updateAODEngine, 1000); // Zamanı her saniye dinamik olarak tazeler
            initNavigation();
        });
    </script>
</body>
</html>
